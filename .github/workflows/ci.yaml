name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest -q tests/

  terraform:
    name: terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform -chdir=infra/terraform/envs/aws-gpu init -backend=false
      - name: terraform validate
        run: terraform -chdir=infra/terraform/envs/aws-gpu validate

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: gpu-benchmark:ci
