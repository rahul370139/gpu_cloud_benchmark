name: release

# Tag-triggered release: build the project image multi-arch and push to GHCR.
# Triggered by tag pushes (vX.Y.Z) or manually for ad-hoc releases.
# Cost: free — uses GitHub Container Registry on github.com runners.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default = git short SHA)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: build & push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/gpu-benchmark:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/gpu-benchmark:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Released" >> "$GITHUB_STEP_SUMMARY"
          echo "- ghcr.io/${{ github.repository_owner }}/gpu-benchmark:${{ steps.tag.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- platforms: linux/amd64, linux/arm64 (DGX Spark + AWS GPU)" >> "$GITHUB_STEP_SUMMARY"
