custom_workloads:
  example_mlp: "user_workloads.example_mlp:ExampleMLPWorkload"

workloads:
  - resnet50
  - bert_base
  - example_mlp
  - name: clip_image_embedding
    target: "user_workloads.clip_image_embedding:ClipImageEmbeddingWorkload"
    modes: [inference]
    batch_sizes: [1, 8, 32]

batch_sizes:
  - 1
  - 8
  - 32
  - 64

num_repeats: 3
warmup_iters: 10
benchmark_iters: 100

seed: 42

modes:
  - inference
  - training

output_dir: results/

prometheus_pushgateway: ""
