# AWS EC2 on-demand GPU instance hourly rates (USD, us-east-1, as of 2024-08)
# Format: gpu_model -> {instance_type, cost_per_hour, gpu_memory_gb}

gpu_rates:
  T4:
    instance_type: g4dn.xlarge
    cost_per_hour: 0.526
    gpu_memory_gb: 16

  V100:
    instance_type: p3.2xlarge
    cost_per_hour: 3.06
    gpu_memory_gb: 16

  A10G:
    instance_type: g5.xlarge
    cost_per_hour: 1.006
    gpu_memory_gb: 24

  A100:
    instance_type: p4d.24xlarge
    cost_per_hour: 32.77
    gpu_memory_gb: 40
    note: "Price is for full 8-GPU instance; per-GPU = 4.10"
    cost_per_gpu_hour: 4.10

  H100:
    instance_type: p5.48xlarge
    cost_per_hour: 98.32
    gpu_memory_gb: 80
    note: "Price is for full 8-GPU instance; per-GPU = 12.29"
    cost_per_gpu_hour: 12.29

  L4:
    instance_type: g6.xlarge
    cost_per_hour: 0.8048
    gpu_memory_gb: 24

  # On-prem DGX Spark dev kit — fully-loaded TCO ("burdened") rate.
  #   hardware:   $3,999 / (3y * 8,760h * 0.70 utilisation)        = $0.218/h
  #   power:      ~240W avg * $0.13/kWh                            = $0.031/h
  #   setup:      ~$500 labour / (3y * 8,760h * 0.70)              = $0.027/h
  #   space + cooling + maintenance (~10% of hardware)             = $0.022/h
  #   ----------------------------------------------------------
  #   total fully-loaded                                            ≈ $0.30/h
  # This is fair: it absorbs install / power / cooling / ops costs
  # so the recommender does not unfairly favour on-prem over cloud.
  NVIDIA_GB10:
    instance_type: dgx_spark_dev_kit
    cost_per_hour: 0.30
    gpu_memory_gb: 128
    note: "DGX Spark (Blackwell GB10) — fully-loaded TCO, 3-year amortisation, 70% utilisation"

  # Local CPU baseline; 0 cost so it always wins on cost but loses on throughput.
  CPU:
    instance_type: local_cpu
    cost_per_hour: 0.00
    gpu_memory_gb: 0
    note: "Local CPU baseline (no GPU)"

