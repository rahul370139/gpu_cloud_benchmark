# Minimal config for local CPU validation (not a real benchmark)
custom_workloads:
  example_mlp: "user_workloads.example_mlp:ExampleMLPWorkload"

workloads:
  - resnet50
  - example_mlp

batch_sizes:
  - 1
  - 4

num_repeats: 2
warmup_iters: 2
benchmark_iters: 5

seed: 42

modes:
  - inference

output_dir: results/

prometheus_pushgateway: ""
